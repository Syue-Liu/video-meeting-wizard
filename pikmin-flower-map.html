<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>巨大花朵採果地圖</title>
    <link rel="stylesheet" href="./pikmin-flower-map.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero-panel">
        <div class="hero-copy">
          <p class="kicker">Pikmin Bloom 輔助筆記</p>
          <h1>巨大花朵採果地圖</h1>
          <div class="top-actions">
            <button id="locateButton" class="icon-button" type="button" title="更新目前位置">定位我</button>
            <button id="menuButton" class="icon-button menu-button" type="button" title="開啟設定">選單</button>
            <button id="exportButton" class="icon-button" type="button" title="匯出資料">匯出</button>
          </div>
        </div>
        <img src="./assets/pikmin-route-hero-mobile.jpg" alt="" />
      </header>

      <section class="map-panel primary-map">
        <div class="map-toolbar">
          <div>
            <h2>採果地圖</h2>
            <p id="mapCaption">新增花點後會依照位置畫在這裡。</p>
          </div>
          <button id="fitButton" class="secondary compact" type="button">重新置中</button>
        </div>
        <div id="mapCanvas" class="map-canvas" aria-label="巨大花朵相對位置地圖"></div>
      </section>

      <section class="tool-cards" aria-label="採果工具">
        <details class="tool-card route-panel" open>
          <summary>
            <span>路線規劃</span>
            <strong id="selectedRouteSummary">0 朵</strong>
          </summary>
          <div class="route-header">
            <h2>建議順序</h2>
            <div class="route-controls">
              <select id="travelModeInput" aria-label="路程模式">
                <option value="walking">步行</option>
                <option value="bicycling">腳踏車</option>
                <option value="scooter">騎車</option>
                <option value="driving">開車</option>
              </select>
              <select id="filterInput" aria-label="篩選花點">
                <option value="active">可採優先</option>
                <option value="all">全部</option>
                <option value="unclaimed">未採果</option>
              </select>
            </div>
          </div>
          <div class="route-basket" aria-label="已選路線">
            <div>
              <span>已選路線</span>
              <p id="selectedRouteHint">勾選想去的花點，再交給 Google Maps 導航。</p>
            </div>
            <div class="route-basket-actions">
              <button id="selectReachableButton" class="secondary compact" type="button">選可採</button>
              <button id="clearRouteButton" class="secondary compact" type="button">清除</button>
              <button id="planRouteButton" class="primary compact" type="button">規劃整體路線</button>
            </div>
          </div>
          <div id="flowerList" class="flower-list"></div>
        </details>

        <details class="tool-card stats-panel">
          <summary>
            <span>統計</span>
            <strong id="nearestLabel">尚無花點</strong>
          </summary>
          <section class="status-grid" aria-label="目前採果狀態">
            <div>
              <span>總花點</span>
              <strong id="totalCount">0</strong>
            </div>
            <div>
              <span>可採</span>
              <strong id="readyCount">0</strong>
            </div>
            <div>
              <span>快結束</span>
              <strong id="urgentCount">0</strong>
            </div>
            <div>
              <span>來得及</span>
              <strong id="reachableCount">待定位</strong>
            </div>
            <div>
              <span>最近距離</span>
              <strong id="nearestDistance">待定位</strong>
            </div>
          </section>
        </details>

        <details class="tool-card input-panel" aria-label="新增巨大花朵">
        <summary>
          <span>新增</span>
          <strong>貼 Google Maps 地點</strong>
        </summary>
        <label>
          Google Maps 連結或座標
          <textarea id="mapsInput" rows="3" placeholder="貼上 Google Maps 連結，或輸入 25.033964, 121.564468"></textarea>
        </label>
        <div class="form-grid">
          <label>
            名稱
            <input id="nameInput" placeholder="例：公園入口、捷運站旁" />
          </label>
          <label>
            花色
            <select id="colorInput">
              <option>白色</option>
              <option>紅色</option>
              <option>黃色</option>
              <option>藍色</option>
            </select>
          </label>
          <label>
            花種
            <select id="typeInput"></select>
          </label>
          <label>
            剩餘時間
            <div class="time-row">
              <input id="hoursInput" inputmode="numeric" min="0" max="23" type="number" value="3" aria-label="剩餘小時" />
              <span>時</span>
              <input id="minutesInput" inputmode="numeric" min="0" max="59" type="number" value="0" aria-label="剩餘分鐘" />
              <span>分</span>
            </div>
          </label>
        </div>
        <label>
          備註
          <input id="noteInput" placeholder="例：從北門走比較快、已看到大果實" />
        </label>
        <div class="button-row">
          <button id="addButton" class="primary" type="button">新增花點</button>
          <button id="clearExpiredButton" class="secondary" type="button">清掉過期</button>
        </div>
        <p id="inputHint" class="hint">短網址如果抓不到座標，請先打開連結，再複製瀏覽器網址列中的完整 Google Maps 網址。</p>
      </details>
      </section>
    </main>

    <template id="flowerTemplate">
      <article class="flower-card">
        <div class="card-head">
          <div>
            <label class="route-check">
              <input data-field="selectedRoute" type="checkbox" />
              <span>選為目的地</span>
            </label>
            <h3></h3>
            <p class="meta"></p>
          </div>
          <span class="state-pill"></span>
        </div>
        <div class="quick-stats"></div>
        <div class="edit-grid">
          <label>
            花色
            <select data-field="color">
              <option>白色</option>
              <option>紅色</option>
              <option>黃色</option>
              <option>藍色</option>
            </select>
          </label>
          <label>
            花種
            <select data-field="type"></select>
          </label>
          <label>
            剩餘分鐘
            <input data-field="remaining" type="number" min="0" inputmode="numeric" />
          </label>
          <label>
            狀態
            <select data-field="claimed">
              <option value="false">未採果</option>
              <option value="true">已採果</option>
            </select>
          </label>
        </div>
        <textarea data-field="note" rows="2" placeholder="備註"></textarea>
        <div class="card-actions">
          <a class="map-link" target="_blank" rel="noreferrer">導航</a>
          <button class="secondary" data-action="refresh" type="button">重設倒數</button>
          <button class="danger" data-action="delete" type="button">刪除</button>
        </div>
      </article>
    </template>

    <script src="./pikmin-flower-map.js"></script>
    <div id="menuBackdrop" class="menu-backdrop" hidden></div>
    <aside id="menuDrawer" class="menu-drawer" aria-label="設定選單" hidden>
      <div class="menu-head">
        <div>
          <span>設定</span>
          <strong>同步與共享</strong>
        </div>
        <button id="closeMenuButton" class="secondary compact" type="button">關閉</button>
      </div>
      <section class="sync-panel" aria-label="多人共享同步設定">
        <div class="sync-title">
          <span>多人共享</span>
          <strong id="syncSummary">尚未設定同步</strong>
        </div>
        <div class="sync-grid">
          <label>
            Google Apps Script 網址
            <input id="syncUrlInput" inputmode="url" placeholder="貼上 Web App 部署網址" />
          </label>
          <label>
            你的暱稱
            <input id="reporterInput" placeholder="例：小明、北區隊友" />
          </label>
        </div>
        <div class="button-row">
          <button id="saveSyncButton" class="primary" type="button">儲存同步設定</button>
          <button id="pullSyncButton" class="secondary" type="button">讀取大家的花點</button>
        </div>
        <p id="syncHint" class="hint">朋友們使用同一個同步網址，就會看到同一批巨大花朵。</p>
      </section>
    </aside>
  </body>
</html>
